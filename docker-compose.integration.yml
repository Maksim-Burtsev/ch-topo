services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "${CHTOPO_CLICKHOUSE_HTTP_PORT:-8124}:8123"
      - "${CHTOPO_CLICKHOUSE_NATIVE_PORT:-9001}:9000"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - ./docker/clickhouse/config.d:/etc/clickhouse-server/config.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
